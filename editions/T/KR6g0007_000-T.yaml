body:
  text: 科南本涅槃經序元崇聖院傳天台宗教校經沙門師正述吾佛大聖人最後雙林會上為末世比丘普及大地眾生明心見性而說是經也備明戒檢廣開常宗摩訶止觀依之為扶律顯常喻之以贖命重寶故經云此經若在佛法則在此經若滅佛法則滅佛法命脈存亡繫焉始於沮渠蒙遜請曇無讖及猛法師兩度翻譯共十三品成四十軸行之北方至宋文帝勅嚴觀二師同謝康樂更共治定開為二十五品縮為三十六軸行之江南其間說聽領悟甚眾著述申明亦多如僧傳所載也去聖逾遙神根轉鈍吾祖章安尊者約龍樹宗旨用天台義門製疏科經深符佛意荊溪刪補法道重明自四明慈雲講唱孤山作記之後寥寥絕聞其故何哉蓋由經文浩博疏義淵微加之科未入經卒難尋討師正刻志斯典有年于茲宋之壬申寓古源法師永清輪下為座首遂倣法華光明體例以疏科句分標經上凡疏不牒者起盡難定而與諸友往復徵折方丈主決必歸於是每夜集於猊峯軒下經科疏記輪環讀之預斯集者大慈懷總報慈大成大雲居簡壽星文勝龍華清正園華懷坦天竺法杭始於是秋之八月終於明年之季春無極東堂可度重加讐訂白雲古山僧錄道安鋟梓流通願與後人受持讀誦如說而行上不孤於佛祖下不負於己靈壽祝一人功霑九有云時至元歲在壬午聖制日序
